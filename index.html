<head>

<style>
:root{
  --ink:#e8ecff;--sub:#9aa3d8;--gold:#f2cf7a;
  --cyan:#5cf0ff;--mag:#ff5ce0;--pur:#8a5cff;
  --chip:#0d1233;--chip-line:rgba(150,180,255,.28);
  --serif:"Shippori Mincho","Noto Serif JP","Yu Mincho",serif;
  --sans:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100%}
body{background:#05030f;color:var(--ink);font-family:var(--sans);font-weight:300;
  -webkit-font-smoothing:antialiased;overflow-x:hidden}
.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.aurora{position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.9;
  background:
   radial-gradient(60% 40% at 22% 12%,rgba(40,90,200,.28),transparent 70%),
   radial-gradient(55% 45% at 82% 22%,rgba(60,120,230,.18),transparent 70%),
   radial-gradient(70% 50% at 50% 108%,rgba(30,70,170,.16),transparent 70%),
   linear-gradient(180deg,#04122e 0%,#061a3e 45%,#030c22 100%)}
.vignette{position:fixed;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse at 50% 42%,transparent 45%,rgba(3,2,10,.8) 100%)}

#app{position:relative;z-index:3;min-height:100dvh;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;padding:56px 22px 40px}
.screen{display:none;flex-direction:column;align-items:center;width:100%;max-width:720px;
  text-align:center;animation:fade 1.1s ease both}
.screen.active{display:flex}
@keyframes fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

.hero{width:min(100%,900px);border-radius:18px;display:block;margin-top:-32px;
  box-shadow:0 20px 70px rgba(0,0,0,.5)}
.eyebrow{font-family:"Cormorant",serif;font-size:14px;letter-spacing:.5em;color:var(--gold);
  text-indent:.5em;margin-bottom:22px;opacity:.9}
h1{font-family:var(--serif);font-weight:500;font-size:clamp(27px,5.4vw,46px);
  letter-spacing:.16em;line-height:1.6;text-shadow:0 0 34px rgba(138,92,255,.5)}
.lead{margin-top:24px;font-size:14px;color:var(--sub);line-height:2.3;letter-spacing:.1em}

.btn{margin-top:40px;padding:16px 54px;font-family:var(--serif);font-size:15px;
  letter-spacing:.3em;text-indent:.3em;color:#fff;cursor:pointer;border:0;border-radius:16px;
  position:relative;background:#1a1550;backdrop-filter:blur(10px);
  box-shadow:0 0 0 1px rgba(150,180,255,.2),0 8px 40px rgba(92,120,255,.2);
  transition:transform .3s,box-shadow .4s;overflow:hidden}
.btn::before{content:'';position:absolute;inset:0;z-index:-1;opacity:.8;
  background:linear-gradient(120deg,#ffd97a,#f0a94b 55%,#ffcf6a);filter:blur(12px)}
.btn:hover{transform:translateY(-2px);box-shadow:0 0 0 1px rgba(180,200,255,.4),0 12px 54px rgba(140,92,255,.45)}
.btn:disabled{opacity:.4;cursor:default;transform:none}
.btn:disabled::before{opacity:.2}
.btn-ghost{margin-top:20px;background:transparent;color:rgba(255,255,255,.55);font-weight:400;
  box-shadow:0 0 0 1px rgba(255,255,255,.15);font-size:13px;padding:12px 40px;letter-spacing:.25em}
.btn-ghost::before{display:none}
.blend-card{margin-top:28px;padding:22px 20px;border-radius:16px;
  background:rgba(255,255,255,.04);border:1px solid rgba(180,160,255,.15);
  text-align:left;max-width:400px;margin-left:auto;margin-right:auto}
.blend-card-title{font-family:var(--serif);font-size:11px;letter-spacing:.2em;
  color:var(--gold);margin-bottom:12px}
.blend-card-text{font-size:12.5px;color:var(--sub);line-height:2.1;letter-spacing:.05em;margin-bottom:12px}.blend-card-text:last-child{margin-bottom:0}
.deep-card{margin-top:28px;padding:22px 20px;border-radius:16px;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,215,130,.12);
  text-align:left;max-width:400px;margin-left:auto;margin-right:auto}
.deep-card-text{font-size:12.5px;color:var(--sub);line-height:2.1;letter-spacing:.05em}
.teach-block{margin-top:28px;padding:20px 22px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(180,160,255,.15);text-align:left;max-width:400px;margin-left:auto;margin-right:auto}
.teach-label{font-size:10px;letter-spacing:.18em;color:var(--gold);margin-bottom:10px}
.teach-text{font-size:12.5px;color:var(--sub);line-height:2;letter-spacing:.05em}
.line-promo{margin-top:28px;font-size:12px;color:var(--sub);letter-spacing:.08em}
.line-promo a{color:var(--gold);text-decoration:underline;text-underline-offset:3px}
.btn-ghost:hover{color:#fff;box-shadow:0 0 0 1px rgba(255,255,255,.3)}
.upsell{margin-top:36px;padding:28px 24px;border-radius:20px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,215,130,.2);
  text-align:left;max-width:360px;margin-left:auto;margin-right:auto}
.upsell-title{font-family:var(--serif);font-size:13px;color:#ffd97a;letter-spacing:.05em;margin-bottom:12px;white-space:nowrap}
.upsell-sub{font-size:12px;color:var(--sub);line-height:1.9;letter-spacing:.05em;margin-bottom:20px}

/* quiz head */
.q-head{position:sticky;top:0;z-index:6;width:100%;padding:20px 0 16px;
  background:linear-gradient(#08051a 68%,transparent)}
.q-title{font-family:var(--serif);font-weight:400;font-size:clamp(15px,3.1vw,20px);
  letter-spacing:.1em;line-height:1.7}
.q-sub{margin-top:12px;font-size:11.5px;letter-spacing:.16em;color:var(--sub)}
.counter{margin-top:16px;font-size:13px;letter-spacing:.24em;color:var(--gold);
  text-shadow:0 0 14px rgba(242,207,122,.75)}
.counter b{font-family:"Cormorant",serif;font-size:20px;font-weight:400}

/* chips */
.kw-wrap{display:flex;flex-wrap:wrap;gap:11px 10px;justify-content:center;margin-top:26px;width:100%}
.kw{position:relative;padding:9px 17px;font-size:13px;font-weight:300;letter-spacing:.04em;
  color:#ffffff;background:rgba(24,30,60,.6);cursor:pointer;user-select:none;
  border:1px solid rgba(245,235,200,.32);
  clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
  transition:color .3s,background .3s,box-shadow .4s,transform .3s}
.kw:hover{color:#fff;background:rgba(40,50,90,.75);transform:translateY(-1px);
  border-color:rgba(255,246,210,.7);
  box-shadow:0 0 6px rgba(255,240,190,.55),0 0 18px rgba(255,226,150,.4);
  text-shadow:0 0 10px rgba(255,244,200,.85)}
.kw.on{color:#fff;background:linear-gradient(135deg,rgba(255,238,180,.28),rgba(255,255,255,.2));
  border-color:rgba(255,246,210,.85);
  box-shadow:0 0 4px rgba(255,240,190,.7),0 0 18px rgba(255,226,150,.5),inset 0 0 12px rgba(255,245,210,.35);
  text-shadow:0 0 10px rgba(255,244,200,.9)}
.kw.on::after{content:'';position:absolute;top:-3px;left:-3px;width:5px;height:5px;border-radius:50%;
  background:#fff;box-shadow:0 0 8px 2px #ffe9a8}

.foot{position:sticky;bottom:0;width:100%;padding:20px 0 8px;
  background:linear-gradient(transparent,#08051a 42%)}
.foot .btn{margin-top:0}

/* result */
#enneagram{width:min(72vw,300px);margin-top:6px}
#enneagram svg{width:100%;height:auto;display:block}
.bignum{margin-top:14px;font-family:"Cormorant",serif;font-weight:400;font-size:clamp(64px,18vw,120px);
  line-height:1;letter-spacing:.04em;color:#fff;
  text-shadow:0 0 24px rgba(255,232,160,.7),0 0 60px rgba(255,210,120,.4)}
.bignum small{display:block;font-family:var(--serif);font-size:15px;letter-spacing:.2em;
  color:var(--gold);margin-top:22px;text-shadow:none}
.result-art{width:min(64vw,280px);margin-top:20px;border-radius:16px;display:block;
  filter:drop-shadow(0 12px 40px rgba(138,92,255,.4))}
.art-cap{margin-top:12px;font-size:11px;letter-spacing:.1em;color:var(--sub);opacity:.85}
.cand{margin-top:30px;width:100%;max-width:520px;text-align:left}
.cand .row{display:flex;align-items:baseline;gap:12px;padding:15px 0;
  border-bottom:1px solid rgba(150,180,255,.14)}
.cand .rank{font-family:"Cormorant",serif;font-size:12px;letter-spacing:.28em;color:var(--gold);flex:0 0 auto;padding-top:4px}
.cand .name{font-family:var(--serif);font-weight:400;font-size:clamp(17px,3.4vw,22px);letter-spacing:.08em}
.cand .cnt{margin-left:auto;font-size:12px;color:var(--sub);white-space:nowrap;padding-left:8px}
.cand .desc{width:100%;font-size:12.5px;color:var(--sub);line-height:2.05;margin-top:7px}
.note{margin-top:24px;font-size:11.5px;color:var(--sub);opacity:.85;line-height:2;max-width:520px;letter-spacing:.05em;white-space:pre-line;text-align:center}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

<div id="app">
  <section class="screen active" id="s-intro">

<script>
/* ---------- background: starfield + spiral galaxy + constellation lines ---------- */
var bg=document.getElementById('bg'),bx=bg.getContext('2d');
var W,H,stars=[],galaxy=[];
function resize(){W=bg.width=innerWidth;H=bg.height=innerHeight;
  stars=Array.from({length:150},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.3+.3,
    p:Math.random()*6.28,s:.4+Math.random()*.9}));
  const cx=W*.5,cy=H*.34;galaxy=[];
  for(let i=0;i<520;i++){const arm=i%2,ang=i*.09+arm*Math.PI,
    rad=(i/520)*Math.min(W,H)*.42;
    galaxy.push({a:ang,r:rad,cx,cy,
      col:i%7===0?'rgba(255,150,230,':i%3===0?'rgba(150,190,255,':'rgba(200,180,255,',
      sz:Math.random()*1.3+.2});}
}
addEventListener('resize',resize);resize();
// 固定星座(相対座標0-1)
var CONSTELLATIONS=[
  [[.08,.4],[.14,.35],[.19,.44],[.25,.38],[.3,.47]],
  [[.85,.36],[.9,.43],[.83,.48],[.92,.53],[.86,.58]],
  [[.68,.7],[.74,.66],[.78,.74],[.84,.69],[.8,.8],[.88,.77]],
  [[.1,.7],[.17,.74],[.14,.83],[.22,.86],[.28,.8]],
  [[.44,.55],[.5,.5],[.55,.58],[.61,.53],[.58,.63]],
  [[.32,.25],[.38,.2],[.43,.28],[.5,.23],[.47,.32],[.55,.3]]
];
function drawConstellations(t){
  bx.save();
  const COL=[[150,200,255],[255,180,220],[180,255,220],[255,225,150],[200,180,255],[255,215,120]];
  CONSTELLATIONS.forEach((c,ci)=>{
    const tw=.5+.5*Math.abs(Math.sin(t*.0004+ci));const[r,g,b]=COL[ci%COL.length];
    bx.strokeStyle=`rgba(${r},${g},${b},${.5*tw})`;bx.lineWidth=1.8;
    bx.beginPath();
    c.forEach((p,i)=>{const x=p[0]*W,y=p[1]*H;i?bx.lineTo(x,y):bx.moveTo(x,y);});
    bx.stroke();
    c.forEach((p,i)=>{const x=p[0]*W,y=p[1]*H;
      bx.beginPath();bx.arc(x,y,i===0?3.6:2.4,0,6.28);
      bx.fillStyle=`rgba(${r},${g},${b},${.75+.25*tw})`;
      bx.shadowColor=`rgba(${r},${g},${b},.9)`;bx.shadowBlur=9;bx.fill();bx.shadowBlur=0;});
  });
  bx.restore();
}
var rot=0;
(function loop(t){
  bx.clearRect(0,0,W,H);
  rot+=0.0006;
  // galaxy
  for(const g of galaxy){const a=g.a+rot,x=g.cx+Math.cos(a)*g.r,y=g.cy+Math.sin(a)*g.r*.62;
    const fade=1-g.r/(Math.min(W,H)*.42);
    bx.beginPath();bx.arc(x,y,g.sz,0,6.28);
    bx.fillStyle=g.col+(0.06+0.32*fade*Math.abs(Math.sin(t*.0006+g.a)))+')';bx.fill();}
  // core glow
  const cg=bx.createRadialGradient(W*.5,H*.34,0,W*.5,H*.34,120);
  cg.addColorStop(0,'rgba(220,200,255,.16)');cg.addColorStop(1,'transparent');
  bx.fillStyle=cg;bx.fillRect(W*.5-120,H*.34-120,240,240);
  drawConstellations(t);
  // foreground stars
  for(const st of stars){const a=.3+.6*Math.abs(Math.sin(t*.001*st.s+st.p));
    bx.beginPath();bx.arc(st.x,st.y,st.r,0,6.28);bx.fillStyle=`rgba(225,225,255,${a})`;bx.fill();}
  // falling stars (shooting stars)
  updateShootingStars(t);
  requestAnimationFrame(loop);
})(0);

/* ---------- shooting stars ---------- */
var shoots=[];
function spawnShoot(){
  var x=Math.random()*W*1.2-W*.1;
  shoots.push({x,y:-10,vx:1.2+Math.random()*1.8,vy:3.5+Math.random()*3,
    len:80+Math.random()*120,life:1,r:.6+Math.random()*.6,
    col:Math.random()<.3?'255,220,180':'220,230,255'});
}
var nextShoot=0;
function updateShootingStars(t){
  if(t>nextShoot){spawnShoot();nextShoot=t+1200+Math.random()*1800;}
  for(var i=(shoots||[]).length-1;i>=0;i--){
    var s=shoots[i];if(!s)continue;s.x+=s.vx;s.y+=s.vy;s.life-=0.018;
    if(s.life<=0||s.y>H+20){shoots.splice(i,1);continue;}
    var a=s.life*.9;
    var grd=bx.createLinearGradient(s.x,s.y,s.x-s.vx/s.vy*s.len,s.y-s.len);
    grd.addColorStop(0,`rgba(${s.col},${a})`);
    grd.addColorStop(1,`rgba(${s.col},0)`);
    bx.beginPath();bx.moveTo(s.x,s.y);bx.lineTo(s.x-s.vx/s.vy*s.len,s.y-s.len);
    bx.strokeStyle=grd;bx.lineWidth=s.r;bx.stroke();
    // head glow
    bx.beginPath();bx.arc(s.x,s.y,s.r*1.8,0,6.28);
    bx.fillStyle=`rgba(${s.col},${a*.8})`;bx.fill();
  }
}

   core:['調和','平穏','和解の促進','衝突回避']},
 1:{name:'改革する人',center:'ガッツ',img:'type_01.png',d:'秩序と理想を追う、誠実で几帳面なタイプ。',long:'「正しくありたい」という理想を胸に、物事を丁寧に整えていく誠実なタイプ。責任感が強く、細部まで手を抜きません。その分、自分にも他人にも厳しくなりやすく、完璧でない状態に苛立ちを覚えることも。少しの余白や不完全さを許すと、肩の力が抜け、本来の温かさが見えてきます。',

var ORDER=[8,9,1,2,3,4,5,6,7];

function enneagramSVG(first,second){
  const cx=100,cy=100,R=78;
  const ORDER9=[9,1,2,3,4,5,6,7,8];
  const pos={};ORDER9.forEach((n,i)=>{const ang=-90+i*40;const r=ang*Math.PI/180;
    pos[n]=[cx+Math.cos(r)*R,cy+Math.sin(r)*R];});
  const P=n=>`${pos[n][0]},${pos[n][1]}`;
  // 正三角形(9-3-6) + ヘキサッド(1-4-2-8-5-7-1)
  const lines=
    `<polygon points="${P(9)} ${P(3)} ${P(6)}" fill="none" stroke="rgba(255,246,210,.3)" stroke-width="1"/>`+
    `<polyline points="${P(1)} ${P(4)} ${P(2)} ${P(8)} ${P(5)} ${P(7)} ${P(1)}" fill="none" stroke="rgba(255,246,210,.3)" stroke-width="1"/>`;
  var dots='';ORDER9.forEach(n=>{const[x,y]=pos[n];
    const isF=n===first,isS=n===second;
    const c=isF?'#ffe9a8':isS?'#bcd4ff':'rgba(255,255,255,.4)';
    const rd=isF?11:isS?8:5;
    const glow=isF?'filter="url(#g1)"':isS?'filter="url(#g2)"':'';
    dots+=`<circle cx="${x}" cy="${y}" r="${rd}" fill="${c}" ${glow}/>`;
    dots+=`<text x="${x}" y="${y+4}" text-anchor="middle" font-size="${isF?12:isS?11:10}" font-family="Cormorant,serif" fill="${isF||isS?'#0a1030':'rgba(10,16,48,.9)'}">${n}</text>`;});
  return `<svg viewBox="0 0 200 200"><defs>
    <filter id="g1"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <circle cx="100" cy="100" r="78" fill="none" stroke="rgba(255,246,210,.2)" stroke-width="1"/>
    ${lines}${dots}</svg>`;
}
var selected=new Set();
document.addEventListener("DOMContentLoaded",function(){
  document.getElementById("paidBtn").href=CONFIG.paidUrl;
  document.getElementById("lineBtn").href=CONFIG.lineUrl;
});
function start(){selected.clear();renderKw();show('s-quiz');}
function restart(){selected.clear();show('s-intro');}
function show(id){document.querySelectorAll('.screen').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById(id);void el.offsetWidth;el.classList.add('active');
  window.scrollTo({top:0,behavior:'instant'});}

function renderKw(){
  var wrap=document.getElementById('kw-wrap');if(!wrap)return;wrap.innerHTML='';
  var all=[];ORDER.forEach(t=>TYPES[t].kw.forEach(k=>all.push({t,k})));
  for(var i=(all||[]).length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=all[i];all[i]=all[j];all[j]=tmp;}
  all.forEach(({t,k})=>{
    const id=t+'|'+k;
    const el=document.createElement('div');el.className='kw';el.textContent=k;
    el.onclick=()=>{selected.has(id)?selected.delete(id):selected.add(id);
      el.classList.toggle('on');updateCounter();};
    wrap.appendChild(el);
  });
  updateCounter();
}
function updateCounter(){document.getElementById('cnum').textContent=selected.size;
  document.getElementById('doneBtn').disabled=selected.size===0;}

function showResult(){
  var raw={},w={};ORDER.forEach(t=>{raw[t]=0;w[t]=0;});
  selected.forEach(id=>{const[t,k]=id.split('|');raw[t]++;w[t]+=TYPES[t].core.includes(k)?2:1;});
  var ranked=ORDER.slice().sort((a,b)=>raw[b]-raw[a]||w[b]-w[a]);
  var first=ranked[0],second=ranked[1];
  document.getElementById('enneagram').innerHTML=enneagramSVG(first,second);
  document.getElementById('bignum').innerHTML=`Type ${first}<small>第二候補　Type ${second}</small>`;
  document.getElementById('result-art').src='img/'+TYPES[first].img;
  document.getElementById('cand').innerHTML=[[first,'FIRST'],[second,'SECOND']].map(([t,label])=>{
    const T=TYPES[t],star=TYPES[t].core.some(c=>selected.has(t+'|'+c))?' ★':'';
    return `<div class="row"><span class="rank">${label}</span>
      <span class="name">Type ${t}　${T.name}</span>
      <span class="cnt">星 ${raw[t]}${star}</span></div>
      <div class="desc">${T.d}（${T.center}センター）<br>${T.long}</div>`;
  }).join('');
  // blend-card: 重なり説明
  var fn=TYPES[first].name, sn=TYPES[second].name;
  document.getElementById('blend-card').innerHTML=
    '<p class="blend-card-title">あなたの星の重なり</p>'+
    '<p class="blend-card-text">あなたはType'+first+'「'+fn+'」の星を中心に持ちながら、Type'+second+'「'+sn+'」のやわらかさも重なっています。</p>'+
    '<p class="blend-card-text">第一候補の星座は、今のあなたの中心に近い傾向を。第二候補の星座は、その奥で影響している別の感覚を映しています。</p>'+
    '<p class="blend-card-text">人の内側は、ひとつのタイプだけでできているわけではありません。強みとして出る星、迷ったときに顔を出す星、まだ言葉になっていない星が、少しずつ重なっています。</p>';

  // deep-card: 有料版への橋渡し
  document.getElementById('deep-card').innerHTML=
    '<p class="blend-card-text">'+
    'この無料診断で見えたのは、今のあなたに強くあらわれている星の輪郭です。</p>'+
    '<p class="blend-card-text">有料版では、第一候補と第二候補の重なり、強みとして輝く場面、つまずきやすい心の流れまで、もう少し深く読み解いていきます。</p>'+
    '<p class="blend-card-text">自分の星座を、もう少し近くで眺めてみたい方は、続きの鑑定へお進みください。'+
    '</p>';

  document.getElementById('teach-block').innerHTML='<p class="teach-label">この星座が教えてくれること</p><p class="teach-text">'+TYPES[first].teach+'</p>';
  document.getElementById('note').textContent=
    raw[first]===0?'まだ星が見つかっていないため、星座は仮のものです。心に触れる言葉を選び直してみてください。'
    :'★は、そのタイプの中核をなす星を見つけた印。\n第一と第二、両方の星座に今のあなたが映ることもあります。';
  show('s-result');
}
</script>
